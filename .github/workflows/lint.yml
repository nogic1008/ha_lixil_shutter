name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

# IMPORTANT: Keep HA_VERSION synchronized across all workflow files:
# - copilot-setup-steps.yml
# - lint.yml
# - validate.yml (if added in the future)

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    env:
      # Use repository variable vars.HA_VERSION if set, otherwise fall back to the default.
      # Set via: GitHub Settings > Secrets and variables > Variables > New repository variable
      HA_VERSION: ${{ vars.HA_VERSION || '2026.4.3' }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        id: setup-python
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.3"
          enable-cache: true
          cache-dependency-glob: "**/requirements*.txt"

      - name: Cache Home Assistant installation
        uses: actions/cache@v5.0.5
        with:
          path: |
            .local/ha-venv
          key: ha-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-ha${{ env.HA_VERSION }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ha-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-ha${{ env.HA_VERSION }}-
            ha-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-
            ha-venv-${{ runner.os }}-

      - name: Install requirements
        run: script/setup/bootstrap

      - name: Lint check
        run: script/lint-check
