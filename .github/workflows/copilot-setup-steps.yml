# Copilot Coding Agent Setup
#
# This workflow configures the environment for GitHub Copilot coding agent.
# It runs automatically before Copilot starts working on any task.
#
# Documentation:
# - https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
# - https://github.blog/changelog/2025-07-30-copilot-coding-agent-custom-setup-steps-are-more-reliable-and-easier-to-debug/

name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

# IMPORTANT: Keep HA_VERSION synchronized across all workflow files:
# - copilot-setup-steps.yml
# - lint.yml
# - validate.yml (if added in the future)

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      # Use repository variable vars.HA_VERSION if set, otherwise fall back to the default.
      # Set via: GitHub Settings > Secrets and variables > Variables > New repository variable
      HA_VERSION: ${{ vars.HA_VERSION || '2026.4.3' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        id: setup-python
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.3"
          enable-cache: true
          cache-dependency-glob: "**/requirements*.txt"

      - name: Cache Home Assistant installation
        uses: actions/cache@v5.0.5
        with:
          path: |
            .local/ha-venv
          key: ha-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-ha${{ env.HA_VERSION }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ha-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-ha${{ env.HA_VERSION }}-
            ha-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-
            ha-venv-${{ runner.os }}-

      - name: Install dependencies
        run: script/setup/bootstrap
